<svg width="100%" viewBox="0 0 680 920" role="img" xmlns="http://www.w3.org/2000/svg" style="font-family: sans-serif; background: #fff;">
<title>Gas Relayer — Full System Architecture</title>
<desc>Architecture showing the full request flow from dApp client through the Rust relayer (API, validation, queue, executor) to the blockchain via MinimalForwarder, with PostgreSQL, Redis, and KMS as supporting infrastructure.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

