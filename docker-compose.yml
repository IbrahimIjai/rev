version: "3.9"

services:
  relayer:
    build:
      context: ./gas-relayer
    ports:
      - "8080:8080"
    environment:
      - RELAYER__SERVER__HOST=0.0.0.0
      - RELAYER__SERVER__PORT=8080
      - RELAYER__RELAYER__PRIVATE_KEY=${RELAYER_PRIVATE_KEY}
      - RELAYER__DATABASE__URL=postgresql://relayer:relayer@postgres:5432/gas_relayer
      - RELAYER__REDIS__URL=redis://redis:6379
      - RUST_LOG=gas_relayer=debug,tower_http=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: relayer
      POSTGRES_PASSWORD: relayer
      POSTGRES_DB: gas_relayer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relayer -d gas_relayer"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    command: ["anvil", "--host", "0.0.0.0", "--port", "8545", "--chain-id", "31337", "--block-time", "2"]
    ports:
      - "8545:8545"

volumes:
  postgres_data:
  redis_data:
