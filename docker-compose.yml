services:
  ui:
    build:
      context: ./ui
      args:
        - TARGETPLATFORM=linux/amd64
    platform: linux/amd64
    ports:
      - "3000:3000"
    env_file:
      - ./ui/.env
    depends_on:
      - relayer
    restart: unless-stopped

  relayer:
    build:
      context: ./gas-relayer
    ports:
      - "8080:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - CHAIN_ID=${CHAIN_ID:-84532}
      - RPC_URL=${RPC_URL:-https://sepolia.base.org}
      - FORWARDER_ADDRESS=${FORWARDER_ADDRESS:-0xDb78D27B530ed9c0fC582f53b558b75c5ab63A90}
      - DOMAIN_NAME=${DOMAIN_NAME:-GasRelayForwarder}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ENCRYPTION_SECRET=${ENCRYPTION_SECRET:-change-me-in-production-32chars!}
      - DATABASE_URL=postgresql://relayer:relayer@postgres:5432/gas_relayer
      - REDIS_URL=redis://redis:6379
      - RUST_LOG=gas_relayer=info,tower_http=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: relayer
      POSTGRES_PASSWORD: relayer
      POSTGRES_DB: gas_relayer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relayer -d gas_relayer"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
