version: "3.9"

services:
  relayer:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - CHAIN_ID=1
      - RPC_URL=http://anvil:8545
      - FORWARDER_ADDRESS=0x5FbDB2315678afecb367f032d93F642f64180aa3
      - RELAYER_PRIVATE_KEY=${RELAYER_PRIVATE_KEY}
      - DOMAIN_NAME=GasRelayer
      - DATABASE_URL=postgresql://relayer:relayer@postgres:5432/gas_relayer
      - REDIS_URL=redis://redis:6379
      - HOST=0.0.0.0
      - PORT=8080
      - RUST_LOG=gas_relayer=debug,tower_http=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: relayer
      POSTGRES_PASSWORD: relayer
      POSTGRES_DB: gas_relayer
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relayer -d gas_relayer"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  # Local Ethereum node for development
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    command: ["anvil", "--host", "0.0.0.0", "--port", "8545", "--chain-id", "31337", "--block-time", "2"]
    ports:
      - "8545:8545"

volumes:
  postgres_data:
  redis_data:
